name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish to PyPI (e.g. v0.1.0). Leave empty to run release-please only."
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: python
          package-name: munich-transport
          bump-minor-pre-major: true
          bump-patch-for-minor-pre-major: true

      - name: Checkout code
        if: ${{ steps.release.outputs.release_created || inputs.tag }}
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || '' }}

      - name: Set up Python
        if: ${{ steps.release.outputs.release_created || inputs.tag }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        if: ${{ steps.release.outputs.release_created || inputs.tag }}
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created || inputs.tag }}
        run: uv sync

      - name: Run tests
        if: ${{ steps.release.outputs.release_created || inputs.tag }}
        run: uv run pytest

      - name: Run linter
        if: ${{ steps.release.outputs.release_created || inputs.tag }}
        run: uv run ruff check .

      - name: Run type checker
        if: ${{ steps.release.outputs.release_created || inputs.tag }}
        run: uv run mypy

      - name: Build package
        if: ${{ steps.release.outputs.release_created || inputs.tag }}
        run: uv build

      - name: Publish to PyPI
        if: ${{ steps.release.outputs.release_created || inputs.tag }}
        uses: pypa/gh-action-pypi-publish@release/v1
